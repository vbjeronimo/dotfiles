# Desktop Config

[global/wm]
margin-top = 0
margin-bottom = 0

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/my-modules.ini

[bar/main]
monitor = HDMI-0
bottom = true
width = 100%
height = 32
fixed-center = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:style=Regular:size=12;2
font-1 = JetBrainsMono Nerd Font:style=Regular:size=16;3

modules-left = distro sep bspwm
modules-center = date
modules-right = temperature cpu memory sep keyboard sep pulseaudio 

tray-position = right
tray-padding = 2
;tray-background = #0063ff

wm-restack = bspwm

cursor-click = pointer
cursor-scroll = ns-resize

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false


; vim:ft=dosini
