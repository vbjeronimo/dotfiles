# Desktop Config

[global/wm]
margin-top = 0
margin-bottom = 0

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[bar/base]
bottom = true
width = 100%
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 0

font-0 = JetBrainsMono Nerd Font:style=Regular:size=12;2
font-1 = JetBrainsMono Nerd Font:style=Regular:size=16;3

cursor-click = pointer
cursor-scroll = ns-resize

[bar/secondary]
inherit = bar/base
monitor = HDMI-0
height = 32

modules-left = distro sep i3
modules-center = date
modules-right = temperature cpu memory sep keyboard sep pulseaudio 

[bar/primary]
inherit = bar/base
monitor = DP-2
height = 36

modules-left = distro sep i3
modules-center = date
modules-right = temperature cpu memory sep keyboard sep pulseaudio 

tray-position = right
tray-padding = 2

[settings]
screenchange-reload = true
